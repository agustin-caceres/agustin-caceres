name: Build profile README

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate profile assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          USER_NAME: agustin-caceres
        run: |
          python scripts/optimize_image.py assets/Gus.jpg assets/Gus-optimized.png
          python scripts/image_to_ascii.py assets/Gus-optimized.png assets/profile-ascii.txt --width 44
          python scripts/build_profile_svg.py assets/Gus-optimized.png assets/profile-ascii.txt --fetch-stats
          python scripts/build_readme.py

      - name: Commit generated profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md dark_mode.svg light_mode.svg assets/profile-ascii.txt
          git diff --cached --quiet || git commit -m "chore: update generated profile"
          git push
